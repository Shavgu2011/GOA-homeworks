<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- video tag: გამოიყენება ვიდეოს ჩასასმელად ვებ-გვერდზე -->
<video src="movie.mp4" controls autoplay loop muted>
    <!-- source tag: ალტერნატიული წყარო ვიდეოსთვის (მაგ. სხვადასხვა ფორმატები) -->
    <source src="movie.mp4" type="video/mp4">
    <source src="movie.ogg" type="video/ogg">
    <!-- ტექსტი, თუ ბრაუზერი ვერ კითხულობს ვიდეოს -->
    Your browser does not support the video tag.
</video>

<!-- audio tag: გამოიყენება აუდიოს ჩასასმელად ვებ-გვერდზე -->
<audio controls>
    <source src="sound.mp3" type="audio/mpeg">
    <source src="sound.ogg" type="audio/ogg">
    <!-- ტექსტი, თუ ბრაუზერი ვერ კითხულობს აუდიოს -->
    Your browser does not support the audio tag.
</audio>

<!--
 src – ფაილის მისამართი (მაგ. "movie.mp4", "sound.mp3").

type – ფაილის ტიპი/ფორმატი (მაგ. "video/mp4", "audio/ogg").

controls – ამატებს მართვის ღილაკებს (play, pause, volume).

autoplay – ვიდეო/აუდიო ავტომატურად იწყება გვერდის ჩატვირთვისას.

loop – ვიდეო/აუდიო დასრულების შემდეგ თავიდან იწყება.

muted – ვიდეო/აუდიო იწყება გამორთული ხმით. -->
</body>
</html>

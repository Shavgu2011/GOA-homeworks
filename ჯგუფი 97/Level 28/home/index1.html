<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe Form</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>
    

  <h2>Subscribe</h2>
  <form>
    <ul>
      <li>
        <label for="name">Name</label><br>
        <input type="text" id="name" name="name" placeholder="Bruce Wayne" required>
      </li>
      <li>
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="bruce@wayneenterpris.es" required>
      </li>
      <li>
        <button type="submit">Subscribe</button>
      </li>
    </ul>
  </form>

</body>
</html>

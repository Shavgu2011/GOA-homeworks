<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block & Inline + Min/Max Width</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    /* Block ელემენტები */
    .block {
      background: lightblue;
      margin: 10px 0;
      padding: 10px;
      min-width: 200px;   /* მინიმუმ */
      max-width: 600px;   /* მაქსიმუმ */
    }

    /* Inline ელემენტები */
    .inline {
      background: lightgreen;
      padding: 5px;
      min-width: 100px;   /* მინიმუმ */
      max-width: 300px;   /* მაქსიმუმ */
      display: inline-block; /* რომ width იმუშაოს */
      margin: 5px;
    }

    /* Responsive image */
    img {
      min-width: 150px;
      max-width: 100%;
    }
  </style>
</head>
<body>
    <h1>Block & Inline Elements with Min/Max Width</h1>

  <h2>Block ელემენტები</h2>
  <div class="block">ეს არის DIV (block)</div>
  <p class="block">ეს არის P (block)</p>
  <section class="block">ეს არის SECTION (block)</section>
  <article class="block">ეს არის ARTICLE (block)</article>
  <nav class="block">ეს არის NAV (block)</nav>

  <h2>Inline ელემენტები</h2>
  <a href="#" class="inline">ეს არის A (inline)</a>
  <img src="poster.jpg" alt="IMG (inline)">
  <b class="inline">ეს არის B (inline)</b>
  <i class="inline">ეს არის I (inline)</i>
  <u class="inline">ეს არის U (inline)</u>
</body>
</html>
  <title>Block & Inline + Min/Max Width</title>

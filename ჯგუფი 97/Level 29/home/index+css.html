<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <<title>Min/Max Width Examples</title>
    <style>
    
    .box1 {
      background: lightblue;
      min-width: 200px;
      width: 50%;
    }

    
    .box2 {
      background: lightgreen;
      max-width: 400px;
      width: 80%;
    }

    
    .box3 {
      background: lightcoral;
      min-width: 150px;
      max-width: 300px;
      width: 60%;
    }

    
    .box4 {
      background: khaki;
      min-width: 250px;
      max-width: 600px;
      margin: auto;
    }

    
    .box5 img {
      max-width: 100%;
      min-width: 150px;
    }

    div {
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>
    

  <div class="box1">მაგალითი 1: min-width 200px</div>
  <div class="box2">მაგალითი 2: max-width 400px</div>
  <div class="box3">მაგალითი 3: min-width 150px, max-width 300px</div>
  <div class="box4">მაგალითი 4: responsive card</div>
  <div class="box5">
    <img src="https://images.unsplash.com/photo-1495745966610-2a67f2297e5e?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="მაგალითი 5: responsive image">
  </div>

  <!-- 
    Box Model
   ყველა HTML ელემენტი წარმოდგენილია როგორც "ყუთი".
   იგი შედგება 4 ფენისგან:


 1. Content 
   - ელემენტის შიგთავსი (ტექსტი, სურათი, სხვა ელემენტები).
   - აქ ჩანს რეალური ინფორმაცია.


 2. Padding 
   - შიგთავსსა და ჩარჩოს (border) შორის სივრცე.
   - ზრდის "სუნთქვას" ელემენტის შიგნით.


 3. Border 
   - ჩარჩო, რომელიც გარს აკრავს ელემენტს.
   - შეიძლება ჰქონდეს ფერი, სისქე, სტილი.


 4. Margin 
   - ელემენტსა და სხვა ელემენტებს შორის სივრცე.
   - გარედან ქმნის დაშორებას. -->

</body>
</html>

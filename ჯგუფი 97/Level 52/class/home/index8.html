<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = Number(prompt("მაღაზია 1 ფასი:")) || Infinity;
        let b = Number(prompt("მაღაზია 2 ფასი:")) || Infinity;
        let c = Number(prompt("მაღაზია 3 ფასი:")) || Infinity;

        let minPrice = Math.min(a, b, c);

        document.write("უმცირესი ფასი: " + minPrice);
    </script>
</body>
</html>

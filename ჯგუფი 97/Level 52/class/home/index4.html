<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let score = Number(prompt("შეიყვანეთ ქულა:"));
        let code = prompt("შეიყვანეთ კოდი:");

        let result = (code === "DOUBLE") || Math.pow(score, 2);

        document.write("შედეგი: " + result);
    </script>
</body>
</html>

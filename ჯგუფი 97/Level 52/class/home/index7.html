<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let temp = Number(prompt("შეიყვანეთ ტემპერატურა:"));

        let sign = Math.sign(temp);

            if (sign === -1 || temp > 40) {
        document.write("ექსტრემალური ტემპერატურაა!");
            } else {
        document.write("ნორმალური ტემპერატურაა");
        }
    </script>
</body>
</html>

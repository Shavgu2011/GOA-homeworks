<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სისტემაში შესვლა</title>
</head>
<body>
    


    <h1>მომხმარებლის შემოწმება</h1>

    <script>
        let user = prompt("შეიყვანეთ თქვენი სახელი:");

        if (!user) {
            document.write("<h2>მომხმარებელი არ არის შესული</h2>");
        } else {
            document.write("<h2>მოგესალმებით, " + user + "!</h2>");
        }
    </script>
</body>
</html>

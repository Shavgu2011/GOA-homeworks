<body>
    <script>
    let a = Number(prompt("კათეტი A:"));
    let b = Number(prompt("კათეტი B:"));

            if (a > 0 && b > 0) {
                let c = Math.sqrt(a * a + b * b);
                document.write("ჰიპოტენუზა: " + c);}
            else {
        document.write("არასწორი კათეტებია!");}
   
    </script>

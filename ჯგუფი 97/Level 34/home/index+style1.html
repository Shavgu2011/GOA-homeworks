<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transform 3 Basics</title>

  <style>
    *{
        margin:0;
        padding:0;
        box-sizing: border-box;
    }
    body {
      background: #0f172a;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding-top: 40px;
    }
    /* TRANSLATE */
    .translate {
      background: #4e73df;
    }
    .translate:hover {
      transform: translateY(-20px);
    }

    /* ROTATE */
    .rotate {
      background: #ff6b6b;
    }
    .rotate:hover {
      transform: rotate(15deg);
    }

    /* SCALE */
    .scale {
      background: #1dd1a1;
    }
    .scale:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <h1>Transform Basics</h1>

  <div class="translate">Translate</div>
  <div class="rotate">Rotate</div>
  <div class="scale">Scale</div>

</body>
</html>

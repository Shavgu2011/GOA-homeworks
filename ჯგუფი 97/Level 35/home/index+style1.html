<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition + Transform Examples</title>
  <style>
    /* 1. Scale */
    .scale-box {
      width: 100px; height: 100px;
      background: teal;
      transition: transform 0.5s ease;
    }
    .scale-box:hover {
      transform: scale(1.5);
    }

    /* 2. Rotate */
    .rotate-box {
      width: 100px; height: 100px;
      background: crimson;
      transition: transform 0.5s ease-in-out;
    }
    .rotate-box:hover {
      transform: rotate(45deg);
    }

    /* 3. Skew */
    .skew-box {
      width: 100px; height: 100px;
      background: gold;
      transition: transform 0.5s ease;
    }
    .skew-box:hover {
      transform: skew(20deg, 10deg);
    }

    /* 4. Translate */
    .move-box {
      width: 100px; height: 100px;
      background: purple;
      transition: transform 0.5s ease;
    }
    .move-box:hover {
      transform: translateX(60px) translateY(20px);
    }

    /* 5. Combined (rotate + scale + translate) */
    .combo-box {
      width: 100px; height: 100px;
      background: darkorange;
      transition: transform 0.7s ease-in-out;
    }
    .combo-box:hover {
      transform: rotate(30deg) scale(1.3) translateX(40px);
    }

    /* Layout helper */
    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
    <h2>Transition + Transform Examples</h2>
  <div class="container">
    <div class="scale-box"></div>
    <div class="rotate-box"></div>
    <div class="skew-box"></div>
    <div class="move-box"></div>
    <div class="combo-box"></div>
  </div>
</body>
</html>
